appId: com.voiceflow.app
productName: VoiceFlow
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - node_modules/**/*
  - package.json
  # Exclude image processing libs dragged in by @nut-tree-fork (unused — we only use keyboard)
  - "!node_modules/@jimp/**/*"
  - "!node_modules/jimp/**/*"
  - "!node_modules/image-q/**/*"
  - "!node_modules/pixelmatch/**/*"
  - "!node_modules/pngjs/**/*"
  - "!node_modules/gifwrap/**/*"
  - "!node_modules/omggif/**/*"
  - "!node_modules/bmp-js/**/*"
  - "!node_modules/jpeg-js/**/*"
  - "!node_modules/utif2/**/*"
  - "!node_modules/exif-parser/**/*"
  - "!node_modules/load-bmfont/**/*"
  - "!node_modules/parse-bmfont-ascii/**/*"
  - "!node_modules/parse-bmfont-binary/**/*"
  - "!node_modules/parse-bmfont-xml/**/*"
  - "!node_modules/xml-parse-from-string/**/*"
  - "!node_modules/xml2js/**/*"
  - "!node_modules/sax/**/*"
  - "!node_modules/pako/**/*"
  - "!node_modules/tinycolor2/**/*"
  - "!node_modules/timm/**/*"
  # Exclude non-win32 native binaries from nut-tree
  - "!node_modules/@nut-tree-fork/libnut/node_modules/@nut-tree-fork/libnut-darwin/**/*"
  - "!node_modules/@nut-tree-fork/libnut/node_modules/@nut-tree-fork/libnut-linux/**/*"
  # Exclude non-win32 prebuilds from uiohook
  - "!node_modules/uiohook-napi/prebuilds/darwin-*/**/*"
  - "!node_modules/uiohook-napi/prebuilds/linux-*/**/*"
asar: true
asarUnpack:
  - node_modules/uiohook-napi/**/*
win:
  target:
    - nsis
  icon: resources/icons/icon.png
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: true
  shortcutName: VoiceFlow
